services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://rest_go:rest_go@postgres:5432/rest_go?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rest_go
      POSTGRES_USER: rest_go
      POSTGRES_PASSWORD: rest_go
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rest_go -d rest_go"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
