root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/api ./cmd/api"
entrypoint = "./tmp/api"
delay = 1000
exclude_dir = ["tmp", "vendor", ".git"]
exclude_file = []
exclude_regex = ["_test.go"]
include_ext = ["go", "toml", "sql"]
kill_delay = "500ms"
log = "build-errors.log"
send_interrupt = true
stop_on_error = true

[log]
time = true

[screen]
clear_on_rebuild = true
