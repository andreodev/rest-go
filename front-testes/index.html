<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | REST Go</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, Helvetica, sans-serif;
            color: #1f2937;
            background: #f4f7fb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f4f7fb;
        }

        main {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        h1,
        h2,
        p {
            margin: 0;
        }

        h1 {
            font-size: 28px;
            line-height: 1.2;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .api-status {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px 12px;
            background: #ffffff;
            color: #475569;
            font-size: 14px;
            white-space: nowrap;
        }

        .layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
            align-items: start;
        }

        section {
            background: #ffffff;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 6px;
            color: #334155;
            font-size: 14px;
            font-weight: 700;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 10px 12px;
            color: #111827;
            font: inherit;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
        }

        button {
            border: 0;
            border-radius: 6px;
            padding: 11px 14px;
            background: #2563eb;
            color: #ffffff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button.secondary {
            background: #e2e8f0;
            color: #1e293b;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .toolbar p {
            color: #64748b;
            font-size: 14px;
        }

        .products {
            display: grid;
            gap: 12px;
        }

        .product {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px;
            background: #fbfdff;
        }

        .product-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }

        .product strong {
            color: #0f172a;
            font-size: 16px;
            overflow-wrap: anywhere;
        }

        .price {
            color: #047857;
            font-weight: 800;
            white-space: nowrap;
        }

        .description {
            color: #475569;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        .meta {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 12px;
            overflow-wrap: anywhere;
        }

        .message {
            display: none;
            margin-top: 14px;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .empty {
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 22px;
            color: #64748b;
            text-align: center;
        }

        @media (max-width: 820px) {
            header,
            .toolbar {
                align-items: stretch;
                flex-direction: column;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .api-status {
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <div>
                <h1>Produtos</h1>
                <p>Integração com a API Go em <strong>localhost:8080</strong></p>
            </div>
            <div class="api-status" id="apiStatus">API: aguardando consulta</div>
        </header>

        <div class="layout">
            <section>
                <h2>Novo produto</h2>
                <form id="productForm">
                    <label>
                        Nome
                        <input id="nameProduct" name="name_product" type="text" placeholder="Ex: Teclado mecânico" required>
                    </label>

                    <label>
                        Preço
                        <input id="price" name="price" type="number" min="0" step="0.01" placeholder="149.90" required>
                    </label>

                    <label>
                        Descrição
                        <textarea id="description" name="description" placeholder="Detalhes do produto" required></textarea>
                    </label>

                    <button id="submitButton" type="submit">Cadastrar produto</button>
                </form>
                <div class="message" id="formMessage"></div>
            </section>

            <section>
                <div class="toolbar">
                    <div>
                        <h2>Lista de produtos</h2>
                        <p id="productsMeta">Carregando produtos...</p>
                    </div>
                    <button class="secondary" id="reloadButton" type="button">Atualizar</button>
                </div>
                <div class="products" id="productsList"></div>
            </section>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:8080';
        const productsList = document.querySelector('#productsList');
        const productsMeta = document.querySelector('#productsMeta');
        const apiStatus = document.querySelector('#apiStatus');
        const form = document.querySelector('#productForm');
        const formMessage = document.querySelector('#formMessage');
        const submitButton = document.querySelector('#submitButton');
        const reloadButton = document.querySelector('#reloadButton');

        const moneyFormatter = new Intl.NumberFormat('pt-BR', {
            style: 'currency',
            currency: 'BRL'
        });

        function setApiStatus(text, isError = false) {
            apiStatus.textContent = text;
            apiStatus.style.borderColor = isError ? '#fecaca' : '#bbf7d0';
            apiStatus.style.color = isError ? '#991b1b' : '#166534';
            apiStatus.style.background = isError ? '#fff1f2' : '#f0fdf4';
        }

        function showMessage(text, type) {
            formMessage.textContent = text;
            formMessage.className = `message ${type} show`;
        }

        function clearMessage() {
            formMessage.textContent = '';
            formMessage.className = 'message';
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        async function request(path, options = {}) {
            const headers = { ...(options.headers || {}) };

            if (options.body) {
                headers['Content-Type'] = 'application/json';
            }

            const response = await fetch(`${API_URL}${path}`, {
                headers,
                ...options
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                throw new Error(data.reason || 'Erro na requisição');
            }

            return data;
        }

        function renderProducts(products) {
            if (!products.length) {
                productsList.innerHTML = '<div class="empty">Nenhum produto cadastrado ainda.</div>';
                return;
            }

            productsList.innerHTML = products.map((product) => `
                <article class="product">
                    <div class="product-header">
                        <strong>${escapeHtml(product.name_product || 'Produto sem nome')}</strong>
                        <span class="price">${moneyFormatter.format(Number(product.price || 0))}</span>
                    </div>
                    <p class="description">${escapeHtml(product.description || 'Sem descrição')}</p>
                    <p class="meta">ID: ${escapeHtml(product.id || '-')} | Criado em: ${escapeHtml(product.created_at || '-')}</p>
                </article>
            `).join('');
        }

        async function loadProducts() {
            reloadButton.disabled = true;
            productsMeta.textContent = 'Carregando produtos...';

            try {
                const data = await request('/products?page=1&limit=10');
                renderProducts(data.products || []);
                productsMeta.textContent = `Página ${data.page || 1} | ${data.total || 0} produto(s) no total`;
                setApiStatus('API: conectada');
            } catch (error) {
                productsList.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
                productsMeta.textContent = 'Não foi possível carregar os produtos';
                setApiStatus('API: erro na conexão', true);
            } finally {
                reloadButton.disabled = false;
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearMessage();
            submitButton.disabled = true;

            const payload = {
                name_product: document.querySelector('#nameProduct').value.trim(),
                price: Number(document.querySelector('#price').value),
                description: document.querySelector('#description').value.trim()
            };

            try {
                await request('/products', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                form.reset();
                showMessage('Produto cadastrado com sucesso.', 'success');
                await loadProducts();
            } catch (error) {
                showMessage(error.message, 'error');
                setApiStatus('API: erro na conexão', true);
            } finally {
                submitButton.disabled = false;
            }
        });

        reloadButton.addEventListener('click', loadProducts);

        loadProducts();
    </script>
</body>
</html>
